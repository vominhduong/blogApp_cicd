spring.application.name=comment-service
server.port=9004

# Register with Eureka Server
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
services.user-service.url=${USER_SERVICE_URL:http://user-service:9002}
services.article-service.url=${ARTICLE_SERVICE_URL:http://article-service:9003}

spring.datasource.driver-class-name = org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://comment-db:5432/commentdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

# Actuator for Docker healthcheck
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info
