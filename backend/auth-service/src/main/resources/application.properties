spring.application.name=auth-service
server.port=9001

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
services.user-service.url=${USER_SERVICE_URL:http://user-service:9002}

jwt.secret=ThisIsAVeryLongAndSecureSecretKeyForSigningTheJWTTokensThatNeedsToBeAtLeast32Bytes
jwt.expiration=3600000

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info
