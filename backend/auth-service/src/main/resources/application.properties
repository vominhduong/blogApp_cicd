spring.application.name=auth-service
server.port=9001

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}

eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${K8S_SERVICE_DNS:${HOSTNAME:${spring.application.name}}}
eureka.instance.non-secure-port=${server.port}
eureka.instance.instance-id=${spring.application.name}:${POD_NAME:${HOSTNAME:${random.value}}}

jwt.secret=ThisIsAVeryLongAndSecureSecretKeyForSigningTheJWTTokensThatNeedsToBeAtLeast32Bytes
jwt.expiration=3600000

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info
