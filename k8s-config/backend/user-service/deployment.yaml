apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: production
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z user-db 5432; do echo waiting for user-db; sleep 2; done
              until nc -z eureka-server 8761; do echo waiting for eureka-server; sleep 2; done
      containers:
        - name: user-service
          image: khanhduy05/user-service:30
          imagePullPolicy: Always
          ports:
            - containerPort: 9002
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9002
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9002
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9002
            initialDelaySeconds: 60
            periodSeconds: 20
