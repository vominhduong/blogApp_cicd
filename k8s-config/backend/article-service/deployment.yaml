apiVersion: apps/v1
kind: Deployment
metadata:
  name: article-service
  namespace: production
  labels:
    app: article-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: article-service
  template:
    metadata:
      labels:
        app: article-service
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z article-db 5432; do echo waiting for article-db; sleep 2; done
      containers:
        - name: article-service
          image: khanhduy05/article-service:41
          imagePullPolicy: Always
          ports:
            - containerPort: 9003
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:9002
            - name: COMMENT_SERVICE_URL
              value: http://comment-service:9004
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9003
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9003
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9003
            initialDelaySeconds: 60
            periodSeconds: 20
