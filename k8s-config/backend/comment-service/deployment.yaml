apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: production
  labels:
    app: comment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z comment-db 5432; do echo waiting for comment-db; sleep 2; done
              until nc -z eureka-server 8761; do echo waiting for eureka-server; sleep 2; done
      containers:
        - name: comment-service
          image: khanhduy05/comment-service:30
          imagePullPolicy: Always
          ports:
            - containerPort: 9004
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "700m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9004
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9004
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9004
            initialDelaySeconds: 60
            periodSeconds: 20
