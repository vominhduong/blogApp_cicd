apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: production
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z eureka-server 8761; do
                echo "waiting for eureka-server";
                sleep 2;
              done
      containers:
        - name: auth-service
          image: khanhduy05/auth-service:32
          imagePullPolicy: Always
          ports:
            - containerPort: 9001
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          startupProbe:
            tcpSocket:
              port: 9001
            failureThreshold: 40
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
