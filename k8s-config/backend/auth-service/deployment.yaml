apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: production
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: khanhduy05/auth-service:41
          imagePullPolicy: Always
          ports:
            - containerPort: 9001
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:9002
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          startupProbe:
            tcpSocket:
              port: 9001
            failureThreshold: 40
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
